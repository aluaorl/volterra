name: Sync to Hugging Face hub

on:
  push:
    branches: [main]   # Действие запускается при пуше в ветку main
  workflow_dispatch:   # Также можно запустить вручную из вкладки Actions

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        # ВНИМАНИЕ: Замените `ВАШ_ЛОГИН` и `ВАШ_SPACE` на свои данные!
run: git push https://alinaorlovich:$HF_TOKEN@huggingface.co/spaces/alinaorlovich/volterra-solver-1 main